
<!DOCTYPE html>
    <html lang="es">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Medidor de Presión</title>
        <script src="/gauge.min.js"></script> <!-- Ruta para cargar gauge.min.js desde el ESP8266 -->
    </head>

    <body>
        <canvas id="gauge"></canvas>
        <script>
            // Crea una instancia de Gauge.js con la configuración deseada
            var gauge = new Gauge({
                renderTo: 'gauge',
                width: 300,
                height: 300,
                minValue: 0,
                maxValue: 100,
                majorTicks: ['0', '20', '40', '60', '80', '100'],
                units: 'PSI',
                title: 'Presión',
                animationRule: 'linear'
            });
            // Establece el valor actual del medidor
            gauge.setValue(50);
            // También puedes actualizar el valor en tiempo real
            // gauge.setValue(newValue);
        </script>
    </body>

    </html>
